# Slightly above default (30ms) to accommodate the NTFS/HDD symlinks in ~
scan_timeout = 50
command_timeout = 1000

# Show active GitHub account
[custom.github]
command = "grep '^    user:' ~/.config/gh/hosts.yml | awk '{print $2}'"
when = true
format = "[gh:$output]($style) "
style = "bold bright-purple"

